<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a1d24" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#9fef00" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#9fef00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phosphorLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#9fef00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9fef00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9fef00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0b0d"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top hairline -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="url(#phosphorLine)" stroke-width="2"/>

  <!-- Eyebrow -->
  <g font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="2.8" fill="#8b8f98">
    <text x="80" y="108" fill="#9fef00">◆</text>
    <text x="100" y="108">AGENTE DE RED / ISPs · WISPs</text>
  </g>

  <!-- Headline -->
  <g font-family="'Fraunces', Georgia, serif" fill="#e8eaed">
    <text x="80" y="230" font-size="106" font-weight="400" letter-spacing="-3">Tu red responde</text>
    <text x="80" y="342" font-size="106" font-weight="400" letter-spacing="-3">
      por <tspan font-style="italic" fill="#9fef00">WhatsApp</tspan><tspan fill="#9fef00">_</tspan>
    </text>
  </g>

  <!-- Sub -->
  <g font-family="Geist, system-ui, sans-serif" fill="#8b8f98" font-size="24">
    <text x="80" y="408">Agente de IA que administra redes MikroTik y OLTs GPON</text>
    <text x="80" y="442">desde cualquier chat. SSH real · Docker sandbox · sin terminales.</text>
  </g>

  <!-- Bottom section: logo + domain + price -->
  <!-- Hairline above -->
  <line x1="80" y1="528" x2="1120" y2="528" stroke="#1e2230" stroke-width="1"/>

  <!-- Logo + wordmark bottom-left -->
  <g transform="translate(80, 556)">
    <!-- Logo mark (scaled up) -->
    <g transform="translate(0, -24) scale(1.5)">
      <path d="M 4 5 L 28 5 L 28 22 L 14 22 L 8 28 L 10 22 L 4 22 Z"
            stroke="#e8eaed" stroke-width="1.8" stroke-linejoin="miter" stroke-linecap="square" fill="none"/>
      <path d="M 10 10.5 L 14 13.5 L 10 16.5"
            stroke="#9fef00" stroke-width="1.8" stroke-linecap="square" fill="none"/>
      <rect x="17" y="11.5" width="5" height="4" fill="#9fef00"/>
    </g>
    <text x="64" y="0" font-family="'JetBrains Mono', monospace" font-size="22" letter-spacing="1" fill="#e8eaed">
      pleno<tspan fill="#9fef00">.</tspan>agent
    </text>
  </g>

  <!-- Domain + price bottom-right -->
  <g font-family="'JetBrains Mono', monospace" fill="#8b8f98" font-size="16" text-anchor="end" letter-spacing="1.5">
    <text x="1120" y="548">plenoagent.com</text>
    <text x="1120" y="576" fill="#e8eaed">$90/mes · licencia por HWID</text>
  </g>

  <!-- Right-side decorative terminal block -->
  <g transform="translate(760, 140)" font-family="'JetBrains Mono', monospace" font-size="13">
    <rect x="0" y="0" width="360" height="240" fill="#101217" stroke="#1e2230" stroke-width="1"/>
    <!-- window chrome -->
    <line x1="0" y1="32" x2="360" y2="32" stroke="#1e2230"/>
    <circle cx="18" cy="16" r="4" fill="#ff4d4d" opacity="0.6"/>
    <circle cx="34" cy="16" r="4" fill="#ffb547" opacity="0.6"/>
    <circle cx="50" cy="16" r="4" fill="#9fef00" opacity="0.7"/>
    <text x="180" y="20" fill="#54585f" text-anchor="middle" font-size="11" letter-spacing="2">agent.log</text>
    <!-- lines -->
    <g fill="#8b8f98">
      <text x="18" y="62"><tspan fill="#9fef00">→</tspan>  inbound   técnico → agent</text>
      <text x="18" y="88"><tspan fill="#9fef00">→</tspan>  tool      bash(ping 10.0.0.5)</text>
      <text x="18" y="114"><tspan fill="#9fef00">→</tspan>  stdout    <tspan fill="#ff4d4d">3/3 loss · host down</tspan></text>
      <text x="18" y="140"><tspan fill="#9fef00">→</tspan>  tool      ssh(10.0.0.4)</text>
      <text x="18" y="166"><tspan fill="#9fef00">→</tspan>  stdout    <tspan fill="#9fef00">uptime: 14d 03h</tspan></text>
      <text x="18" y="192"><tspan fill="#9fef00">→</tspan>  reply     mensaje → whatsapp</text>
    </g>
    <!-- cursor -->
    <text x="18" y="220" fill="#9fef00">&gt;</text>
    <rect x="32" y="210" width="8" height="12" fill="#9fef00" opacity="0.85"/>
  </g>

  <!-- Bottom hairline -->
  <line x1="0" y1="629" x2="1200" y2="629" stroke="url(#phosphorLine)" stroke-width="2"/>
</svg>
